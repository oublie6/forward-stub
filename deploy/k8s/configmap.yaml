apiVersion: v1
kind: ConfigMap
metadata:
  name: forward-stub-config
data:
  config.json: |
    {
      "version": 1,
      "logging": {"level": "info", "file": "/var/log/forward-stub/app.log", "compress": true, "max_size_mb": 100, "max_backups": 5, "max_age_days": 30},
      "receivers": {
        "in": {"type": "udp_gnet", "listen": "udp://0.0.0.0:19000", "multicore": true}
      },
      "senders": {
        "out": {"type": "udp_unicast", "local_ip": "0.0.0.0", "local_port": 19001, "remote": "127.0.0.1:19002"}
      },
      "pipelines": {"p": []},
      "tasks": {
        "t": {
          "pool_size": 1024,
          "fast_path": true,
          "receivers": ["in"],
          "pipelines": ["p"],
          "senders": ["out"]
        }
      }
    }
