apiVersion: v1
kind: ConfigMap
metadata:
  name: forward-stub-config
data:
  config.json: |
    {
      "version": 5,
      "control": {
        "api": "",
        "timeout_sec": 5,
        "config_watch_interval": "2s"
      },
      "logging": {
        "level": "info",
        "file": "/var/log/forward-stub/app.log",
        "traffic_stats_interval": "5s",
        "traffic_stats_sample_every": 1,
        "compress": true,
        "max_size_mb": 100,
        "max_backups": 5,
        "max_age_days": 30
      },
      "receivers": {
        "udp_in": {
          "type": "udp_gnet",
          "listen": "udp://0.0.0.0:19000",
          "multicore": true,
          "frame": ""
        }
      },
      "senders": {
        "udp_out": {
          "type": "udp_unicast",
          "local_ip": "0.0.0.0",
          "local_port": 19001,
          "remote": "127.0.0.1:19002",
          "concurrency": 1
        }
      },
      "pipelines": {
        "default": []
      },
      "tasks": {
        "udp-forward": {
          "pool_size": 1024,
          "queue_size": 4096,
          "fast_path": true,
          "receivers": ["udp_in"],
          "pipelines": ["default"],
          "senders": ["udp_out"]
        }
      }
    }
