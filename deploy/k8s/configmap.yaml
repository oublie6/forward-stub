apiVersion: v1
kind: ConfigMap
metadata:
  name: forward-stub-config
data:
  config.json: |
    {
      "version": 5,
      "control": {
        "api": "",
        "timeout_sec": 5,
        "config_watch_interval": "2s"
      },
      "logging": {
        "level": "info",
        "file": "/var/log/forward-stub/app.log",
        "traffic_stats_interval": "5s",
        "traffic_stats_sample_every": 1,
        "compress": true,
        "max_size_mb": 100,
        "max_backups": 5,
        "max_age_days": 30,
        "gc_stats_log_enabled": false,
        "gc_stats_log_interval": "1m"
      },
      "receivers": {
        "udp_in": {
          "type": "udp_gnet",
          "listen": "0.0.0.0:19000",
          "selector": "sel_udp_in",
          "multicore": true,
          "frame": ""
        }
      },
      "selectors": {
        "sel_udp_in": {
          "default_task_set": "ts_udp_forward"
        }
      },
      "task_sets": {
        "ts_udp_forward": ["udp-forward"]
      },
      "senders": {
        "udp_out": {
          "type": "udp_unicast",
          "local_ip": "0.0.0.0",
          "local_port": 19001,
          "remote": "127.0.0.1:19002",
          "concurrency": 1
        }
      },
      "pipelines": {
        "default": []
      },
      "tasks": {
        "udp-forward": {
          "pool_size": 1024,
          "queue_size": 4096,
          "execution_model": "fastpath",
          "pipelines": ["default"],
          "senders": ["udp_out"]
        }
      }
    }
